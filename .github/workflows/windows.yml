name: windows

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          choco install ninja --no-progress -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          aqtversion: '==3.1.*'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Print Qt toolchain
        shell: pwsh
        run: |
          python --version
          ninja --version
          cmake --version
          Write-Host "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          qmake -query
          Get-Command windeployqt
          makensis /VERSION

      - name: Configure
        run: cmake -S . -B build-win-ci -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-win-ci --config Release -j2

      - name: Locate Qt bin
        shell: pwsh
        run: |
          if (-not $env:QT_ROOT_DIR) {
            throw "QT_ROOT_DIR is not set by install-qt-action."
          }
          $qtBinDir = Join-Path $env:QT_ROOT_DIR "bin"
          if (-not (Test-Path (Join-Path $qtBinDir "windeployqt.exe"))) {
            throw "windeployqt.exe not found under $qtBinDir"
          }
          "QT_BIN_DIR=$qtBinDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1 -BuildDir build-win-ci -QtBinDir "$env:QT_BIN_DIR"

      - name: Verify Windows package
        shell: pwsh
        run: ./scripts/verify-windows-package.ps1 -BuildDir build-win-ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cappy-windows-packages
          path: |
            build-win-ci/*.zip
            build-win-ci/*.exe
